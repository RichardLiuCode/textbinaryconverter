<!DOCTYPE html>
<html>

<head>
    <title>Binary to Text</title>
    <link rel="stylesheet" href="top-bar.css">
    <link rel="stylesheet" href="binary-to-text/style.css">
    <script defer src="binary-to-text/top-bar.js"></script>
    <script defer src="binary-to-text/script.js"></script>
</head>

<body>
    <div class="topBar">
        <button name="topBarHomeButton">Home</button>
        <button name="topBarTextToBinaryButton">Text to Binary</button>
    </div>
    <h1 class="title">Binary to Text</h1>
    <div class="InputOutputWrapper">
        <button class="copyButtons" id="inputValueCopyBtn">Copy</button>
        <textarea id="input" placeholder="Binarys"></textarea>
    </div>
    <div class="convertButtonWrapper">
        <button id="convert">Convert</button>
    </div>
    <div class="InputOutputWrapper">
        <button class="copyButtons" id="resultValueCopyBtn">Copy</button>
        <br>
        <textarea id="result" placeholder="Text" readonly></textarea>
    </div>
</body>

</html>
