<!DOCTYPE html>
<html>

<head>
    <title>Text to Binary</title>
    <link rel="stylesheet" href="top-bar.css">
    <link rel="stylesheet" href="text-to-binary/style.css">
    <script defer src="text-to-binary/top-bar.js"></script>
    <script defer src="text-to-binary/script.js"></script>
</head>

<body>
    <div class="topBar">
        <button name="topBarHomeButton">Home</button>
        <button name="topBarBinaryToTextButton">Binary to text</button>
    </div>
    <h1 class="title">Text to Binary</h1>
    <div class="InputOutputWrapper">
        <button class="copyButtons" id="inputValueCopyBtn">Copy</button>
        <textarea id="input" placeholder="Text"></textarea>
    </div>
    <div class="convertButtonWrapper">
        <button id="convert">Convert</button>
    </div>
    <div class="InputOutputWrapper">
        <button class="copyButtons" id="resultValueCopyBtn">Copy</button>
        <br>
        <textarea id="result" placeholder="Binary output" readonly></textarea>
    </div>
</body>

</html>
